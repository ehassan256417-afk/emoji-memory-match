<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Memory Match</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/game.css">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#" style="font-family: 'Press Start 2P', system-ui;">🐶 EMOJI MATCH</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><button id="resetBtn" class="btn btn-outline-light me-2">Reset Game</button></li>
                    <li class="nav-item"><button class="btn btn-outline-light me-2" data-bs-toggle="modal" data-bs-target="#settingsModal">Settings</button></li>
                    <li class="nav-item"><button class="btn btn-outline-light" data-bs-toggle="modal" data-bs-target="#howToPlayModal">How to Play</button></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="row">
            <div class="col-lg-3">
                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title">Player: <span id="playerDisplay" class="text-primary">Player</span></h5>
                        <div class="d-flex justify-content-between mb-2"><span>Moves</span><strong id="movesDisplay">0</strong></div>
                        <div class="d-flex justify-content-between mb-3"><span>Time</span><strong id="timerDisplay">00:00</strong></div>
                        <div class="progress" style="height: 10px;">
                            <div id="progressBar" class="progress-bar progress-bar-striped" role="progressbar" style="width: 0%"></div>
                        </div>
                        <small class="text-muted" id="progressText">0 / 6 matched</small>
                    </div>
                </div>
            </div>

            <div class="col-lg-9">
                <div id="gameBoard" class="memory-board"></div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-light py-3">
        <div class="container text-center small">
            <a href="https://github.com/ehassan256417-afk" class="text-light mx-2" target="_blank">Dev Profile</a> |
            <a href="https://github.com/ehassan256417-afk/emoji-memory-match" class="text-light mx-2" target="_blank">Source Code</a>
        </div>
    </footer>

    <!-- Settings Modal -->
    <div class="modal fade" id="settingsModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Settings</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="settingsForm" novalidate>
                        <div class="mb-3">
                            <label class="form-label">Player Name</label>
                            <input type="text" id="playerNameInput" class="form-control" required minlength="3" pattern="[A-Za-z\s]+" placeholder="Your name">
                            <div class="invalid-feedback">Name must be at least 3 letters.</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Difficulty</label>
                            <select id="difficultyInput" class="form-select">
                                <option value="4">Easy (4 pairs)</option>
                                <option value="6" selected>Medium (6 pairs)</option>
                                <option value="8">Hard (8 pairs)</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Save & Apply</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- How to Play Modal -->
    <div class="modal fade" id="howToPlayModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">How to Play</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Match all emoji pairs!</p>
                    <ul>
                        <li>Click two cards to flip them</li>
                        <li>If they match, they stay open</li>
                        <li>If not, they flip back after 1 second</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="scripts/game.js"></script>
</body>
