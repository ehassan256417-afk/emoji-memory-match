<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Memory Match</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/game.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<header class="bg-primary text-white p-3">
    <nav class="navbar navbar-expand-lg navbar-dark container">
        <a class="navbar-brand" href="#">Emoji Match</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><button class="btn btn-light me-2" id="resetBtn">Play / Reset</button></li>
                <li class="nav-item"><button class="btn btn-light" data-bs-toggle="modal" data-bs-target="#howToPlayModal">How to Play</button></li>
                <li class="nav-item"><a class="btn btn-light ms-2" href="#">Dev Profile</a></li>
            </ul>
        </div>
    </nav>
</header>

<main class="container my-4">
    <section class="mb-3">
        <form id="settingsForm" class="row g-3 needs-validation" novalidate>
            <div class="col-md-4">
                <label for="playerName" class="form-label">Player Name</label>
                <input type="text" class="form-control" id="playerName" required pattern="^[A-Za-z ]{2,20}$">
                <div class="invalid-feedback">Enter 2-20 letters only.</div>
            </div>
            <div class="col-md-4">
                <label for="themeSelect" class="form-label">Theme</label>
                <select class="form-select" id="themeSelect" required>
                    <option value="light" selected>Light</option>
                    <option value="dark">Dark</option>
                </select>
                <div class="invalid-feedback">Select a theme.</div>
            </div>
            <div class="col-md-4 align-self-end">
                <button class="btn btn-success" type="submit">Save Settings</button>
            </div>
        </form>
    </section>

    <section>
        <div class="d-flex justify-content-between mb-2">
            <span id="playerDisplay">Player: -</span>
            <span id="scoreDisplay">Score: 0</span>
        </div>
        <div id="gameBoard" class="row g-2"></div>
    </section>
</main>

<footer class="bg-light text-center p-3">
    <a href="#" class="me-2">Dev Profile</a>
    <a href="#" class="me-2">Repo</a>
    <a href="#" class="me-2">Nu Validator</a>
    <a href="#">WAVE</a>
</footer>

<!-- How to Play Modal -->
<div class="modal fade" id="howToPlayModal" tabindex="-1" aria-labelledby="howToPlayLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">How to Play</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                Match all pairs of emojis as fast as possible. Flip two cards at a time. Score increases with each match.
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<script type="module" src="scripts/game.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
